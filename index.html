<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Tools — Live Showcase</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    overflow: hidden;
    width: 100vw; height: 100vh;
  }
  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    z-index: 1;
  }
  .overlay {
    position: absolute;
    bottom: 32px; left: 32px;
    z-index: 10;
    pointer-events: none;
  }
  .overlay h1 {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }
  .status-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    margin-bottom: 4px;
    opacity: 0.7;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 6px #00ff88;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .top-bar {
    position: absolute;
    top: 24px; right: 28px;
    z-index: 10;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .badge {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    color: #aaa;
    background: rgba(255,255,255,0.03);
  }
</style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="top-bar">
    <div class="badge">Hermes v1.0</div>
    <div class="badge">Git ✓</div>
    <div class="badge">Vercel ✓</div>
  </div>
  <div class="overlay">
    <h1>System Status</h1>
    <div class="status-line"><div class="dot"></div> GitHub Repository verbunden</div>
    <div class="status-line"><div class="dot"></div> Vercel Edge Network aktiv</div>
    <div class="status-line"><div class="dot"></div> Animation-Engine — 60 FPS</div>
    <div class="status-line"><div class="dot"></div> Alle Tools operational</div>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let width, height;

const WORDS = ['HERMES', 'TOOLS', 'LIVE', 'DEPLOYED'];
const PALETTES = [
  ['#00f2ff', '#00c3ff', '#0099ff'],
  ['#00ff88', '#00ffaa', '#88ffcc'],
  ['#ffaa00', '#ff7700', '#ff4400'],
  ['#ff00aa', '#ff00ff', '#aa00ff']
];

// State machine: 'HOLD' | 'MORPH'
let state = 'HOLD';
let wordIndex = 0;
let nextWordIndex = 1;
let morphProgress = 0;
const HOLD_FRAMES = 220;   // ~3.6s at 60fps
const MORPH_FRAMES = 150;  // ~2.5s morph duration
let frameCounter = 0;

let wordPixels = [];       // Array of pixel positions per word
let particles = [];
const PARTICLE_COUNT = 2400;
const MOUSE_RADIUS = 160;
let mouse = { x: -9999, y: -9999, active: false };

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => {
  resize();
  cacheAllWords();
  assignWordTargets(wordIndex);
});
resize();

// Get pixel positions for text (grid-sampled)
function getTextPixels(text) {
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  const fontSize = Math.min(width / 5.5, 160);
  tempCanvas.width = width;
  tempCanvas.height = height;

  tempCtx.font = `bold ${fontSize}px "SF Mono", "Fira Code", "Courier New", monospace`;
  tempCtx.fillStyle = '#fff';
  tempCtx.textAlign = 'center';
  tempCtx.textBaseline = 'middle';
  tempCtx.fillText(text, width / 2, height / 2);

  const imageData = tempCtx.getImageData(0, 0, width, height);
  const pixels = [];
  const step = Math.max(3, Math.floor(fontSize / 20));

  for (let y = 0; y < height; y += step) {
    for (let x = 0; x < width; x += step) {
      const i = (y * width + x) * 4;
      if (imageData.data[i + 3] > 128) {
        pixels.push({ x, y });
      }
    }
  }
  return pixels;
}

function cacheAllWords() {
  wordPixels = WORDS.map(w => getTextPixels(w));
}

class Particle {
  constructor() {
    // Current position
    this.x = Math.random() * width;
    this.y = Math.random() * height;

    // Velocity (very gentle)
    this.vx = 0;
    this.vy = 0;

    // Anchors: where this particle sits in each word
    this.homeX = this.x;
    this.homeY = this.y;
    this.nextX = this.x;
    this.nextY = this.y;

    // Idle drift anchor (for particles not matched to a letter pixel)
    this.idleX = this.x;
    this.idleY = this.y;
    this.idlePhase = Math.random() * Math.PI * 2;

    this.size = Math.random() * 1.2 + 0.4;
    this.friction = 0.94;
    this.ease = 0.035;       // very soft pull to target
    this.paletteIndex = Math.floor(Math.random() * 3);
    this.breathOffset = Math.random() * Math.PI * 2;
  }

  // Assign this particle to specific pixel positions in two words
  assign(homePixel, nextPixel) {
    if (homePixel) {
      this.homeX = homePixel.x;
      this.homeY = homePixel.y;
    }
    if (nextPixel) {
      this.nextX = nextPixel.x;
      this.nextY = nextPixel.y;
    }
    // If one side is missing, fall back to the other
    if (!homePixel) { this.homeX = this.nextX; this.homeY = this.nextY; }
    if (!nextPixel) { this.nextX = this.homeX; this.nextY = this.homeY; }
  }

  // Set idle orbit for particles not used by current words
  setIdle(cx, cy, angle, radius) {
    this.idleX = cx + Math.cos(angle) * radius;
    this.idleY = cy + Math.sin(angle) * radius;
    // Also set as home so they don't fly in from random places
    this.homeX = this.idleX;
    this.homeY = this.idleY;
    this.nextX = this.idleX;
    this.nextY = this.idleY;
  }

  update(progress, isMorphing) {
    // 1. Compute target based on state
    let targetX, targetY;

    if (isMorphing) {
      // Linear interpolation between home and next
      targetX = this.homeX + (this.nextX - this.homeX) * progress;
      targetY = this.homeY + (this.nextY - this.homeY) * progress;
    } else {
      // Holding: gentle breathing around home position
      const breath = Math.sin(Date.now() * 0.0015 + this.breathOffset) * 1.5;
      targetX = this.homeX + breath;
      targetY = this.homeY + breath;
    }

    // 2. Mouse repulsion (gentle)
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < MOUSE_RADIUS && dist > 0) {
      const force = ((MOUSE_RADIUS - dist) / MOUSE_RADIUS) * 2.5;
      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;
    }

    // 3. Pull toward target
    this.vx += (targetX - this.x) * this.ease;
    this.vy += (targetY - this.y) * this.ease;

    // 4. Apply friction (heavy damping = calm water, not rapids)
    this.vx *= this.friction;
    this.vy *= this.friction;

    // 5. Move
    this.x += this.vx;
    this.y += this.vy;
  }

  draw(ctx, palette, isMorphing) {
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    const color = palette[this.paletteIndex % palette.length];

    // Brighter during morph, dimmer but visible while holding
    let alpha = isMorphing ? 0.9 : 0.6;
    if (speed > 2) alpha += 0.15;

    // Core dot
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha;
    ctx.fill();

    // Soft glow for all particles
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha * 0.08;
    ctx.fill();

    ctx.globalAlpha = 1;
  }
}

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }
}

// One-time assignment: map particles to word pixel positions
function assignWordTargets(fromIdx, toIdx) {
  const fromPixels = wordPixels[fromIdx] || [];
  const toPixels = wordPixels[toIdx] || [];

  // Shuffle pixels so mapping looks organic
  const shuffledFrom = [...fromPixels].sort(() => Math.random() - 0.5);
  const shuffledTo = [...toPixels].sort(() => Math.random() - 0.5);

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];

    if (i < shuffledFrom.length && i < shuffledTo.length) {
      // Particle belongs to a letter pixel in both words
      p.assign(shuffledFrom[i], shuffledTo[i]);
    } else if (i < shuffledFrom.length) {
      // Only in source word
      p.assign(shuffledFrom[i], null);
    } else if (i < shuffledTo.length) {
      // Only in destination word
      p.assign(null, shuffledTo[i]);
    } else {
      // Excess particle -> idle orbit
      const angle = (i / PARTICLE_COUNT) * Math.PI * 2;
      const radius = 90 + Math.sin(i * 0.5) * 60;
      p.setIdle(width / 2, height / 2, angle, radius);
    }
  }
}

// Mouse / touch tracking
canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
});
canvas.addEventListener('touchend', () => { mouse.active = false; });

// Animation loop
function animate() {
  // Trail effect: partial clear instead of full black
  ctx.fillStyle = 'rgba(5, 5, 8, 0.45)';
  ctx.fillRect(0, 0, width, height);

  const palette = PALETTES[wordIndex];
  const isMorphing = state === 'MORPH';

  if (isMorphing) {
    morphProgress = Math.min(1, frameCounter / MORPH_FRAMES);
    frameCounter++;

    if (morphProgress >= 1) {
      // Morph complete -> switch to next word
      wordIndex = nextWordIndex;
      nextWordIndex = (nextWordIndex + 1) % WORDS.length;
      frameCounter = 0;
      morphProgress = 0;
      state = 'HOLD';
      // Re-assign targets so current "home" becomes the new word
      assignWordTargets(wordIndex, nextWordIndex);
    }
  } else {
    // HOLD state
    frameCounter++;
    if (frameCounter >= HOLD_FRAMES) {
      frameCounter = 0;
      morphProgress = 0;
      state = 'MORPH';
      // Targets already assigned at end of last morph
    }
  }

  particles.forEach(p => p.update(morphProgress, isMorphing));
  particles.forEach(p => p.draw(ctx, palette, isMorphing));

  // Subtle scanlines
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  for (let y = 0; y < height; y += 4) {
    ctx.fillRect(0, y, width, 1);
  }

  requestAnimationFrame(animate);
}

// Bootstrap
cacheAllWords();
initParticles();
// First assignment: all particles start from their HERMES positions
assignWordTargets(0, 1);
animate();
</script>
</body>
</html>
